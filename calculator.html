<!-- Calculator Utility for SPICE Dashboard Controlbar -->

<!-- calculator.html -->
<!DOCTYPE html>
<html>
<head>
    <style>
        body { 
            margin: 0; 
            padding: 0; 
            display: flex; 
            justify-content: center; 
            background-color: #f4f4f4; /* Light grey background */
            font-family: sans-serif;
        }
        .calculator {
            width: 100%; /* Slightly narrower to fit the frame */
	    height: auto;
            padding: 15px;
            background-color: #f9f9f9;
            box-sizing: border-box;
        }
        .display {
            width: 100%;
            height: 50px;
            margin-bottom: 15px;
            padding: 10px;
            font-size: 24px;
            text-align: right;
            border: 1px solid #ccc;
            border-radius: 5px;
            background: #fff;
            color: #000; /* Force black text */
            box-sizing: border-box;
        }
        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
        }
        .button {
            height: 55px;
            font-size: 1.2em;
            cursor: pointer;
            background-color: #ffffff;
            border: 1px solid #ddd;
            border-radius: 5px;
            color: #333; /* Dark grey text - easy to read! */
            font-weight: bold;
        }
        .button:hover { background-color: #eee; }
        .operator {
            background-color: #ff9800;
            color: white !important; /* White text on orange operators */
            border: none;
        }
        .equals {
            grid-row: span 2;
            height: 118px;
            background-color: #3170de;
            color: white !important;
            border: none;
        }
    </style>
</head>
<body>
    <div class="calculator">
        <input type="text" class="display" id="display" readonly>
        <div class="buttons">
            <button class="button" onclick="clearDisplay()">C</button>
            <button class="button operator" onclick="appendValue('/')">/</button>
            <button class="button operator" onclick="appendValue('*')">*</button>
            <button class="button operator" onclick="appendValue('-')">-</button>
            <button class="button" onclick="appendValue('7')">7</button>
            <button class="button" onclick="appendValue('8')">8</button>
            <button class="button" onclick="appendValue('9')">9</button>
            <button class="button operator" onclick="appendValue('+')">+</button>
            <button class="button" onclick="appendValue('4')">4</button>
            <button class="button" onclick="appendValue('5')">5</button>
            <button class="button" onclick="appendValue('6')">6</button>
            <button class="button equals" onclick="calculate()">=</button>
            <button class="button" onclick="appendValue('1')">1</button>
            <button class="button" onclick="appendValue('2')">2</button>
            <button class="button" onclick="appendValue('3')">3</button>
            <button class="button" style="grid-column: span 2;" onclick="appendValue('0')">0</button>
            <button class="button" onclick="appendValue('.')">.</button>
        </div>
    </div>
    <script>
        let display = document.getElementById('display');
        function appendValue(value) { display.value += value; }
        function clearDisplay() { display.value = ''; }
        function calculate() {
            try { display.value = eval(display.value); } 
            catch (e) { display.value = 'Error'; }
        }
    </script>
</body>
</html>
